name: security-gates

on:
  pull_request:
  push:
    branches: [ main, master ]

jobs:
  redteam:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run security:scan
      - run: npm run test:redteam
