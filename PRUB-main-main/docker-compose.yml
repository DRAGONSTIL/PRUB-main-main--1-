version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://atlas:atlas@db:5432/atlas
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me
      DEMO_MODE: "true"

volumes:
  pgdata:
